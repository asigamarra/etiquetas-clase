<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Etiquetas de Cocina</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .formulario { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; border: 1px solid #ccc; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
        
        /* Área de la etiqueta que se verá al imprimir */
        #etiqueta-final { margin-top: 30px; border: 2px solid black; padding: 20px; background: white; width: 300px; margin-left: auto; margin-right: auto; text-align: center; }
        
        @media print {
            .formulario { display: none; }
            body { background: white; }
            #etiqueta-final { border: 2px solid black; position: absolute; top: 0; left: 0; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="formulario">
        <h2>🏷️ Datos del Plato</h2>
        
        <label>Nombre del Plato:</label>
        <input type="text" id="in-plato" oninput="actualizar()" placeholder="Ej: Canelones">
        
        <label>Método:</label>
        <select id="in-metodo" onchange="actualizar()">
            <option value="♨️ MICROONDAS">Microondas</option>
            <option value="🍱 HORNO">Horno</option>
            <option value="🍳 SARTÉN">Sartén</option>
            <option value="❄️ FRÍO">Consumo en Frío</option>
        </select>
        
        <label>Instrucciones (Tiempo/Temp):</label>
        <input type="text" id="in-instru" oninput="actualizar()" placeholder="3 min a 800W">
        
        <label>Nota del Chef:</label>
        <textarea id="in-nota" oninput="actualizar()" placeholder="Añadir queso fresco al servir..."></textarea>

        <button onclick="window.print()">🖨️ IMPRIMIR ETIQUETA</button>
    </div>

    <div id="etiqueta-final">
        <h3 id="out-plato">Nombre del Plato</h3>
        <hr>
        <p><strong>MODO:</strong> <span id="out-metodo">♨️ MICROONDAS</span></p>
        <p><strong>PASOS:</strong> <span id="out-instru">...</span></p>
        <p><em><span id="out-nota">...</span></em></p>
        <hr>
        <p style="font-size: 10px;">Gestión de la Producción - Takeaway</p>
    </div>

    <script>
        function actualizar() {
            document.getElementById('out-plato').innerText = document.getElementById('in-plato').value || "Nombre del Plato";
            document.getElementById('out-metodo').innerText = document.getElementById('in-metodo').value;
            document.getElementById('out-instru').innerText = document.getElementById('in-instru').value || "...";
            document.getElementById('out-nota').innerText = document.getElementById('in-nota').value || "...";
        }
    </script>

</body>
</html>
